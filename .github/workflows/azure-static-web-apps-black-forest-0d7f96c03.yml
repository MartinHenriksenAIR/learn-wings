name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          # Vite inlines VITE_* at build time. None of these are secrets:
          # the Entra client id and Supabase anon key are public client identifiers.
          VITE_ENTRA_CLIENT_ID: 2f2f3964-fa8b-4ecc-97fe-85b969c0855a
          VITE_ENTRA_SCOPE: api://2f2f3964-fa8b-4ecc-97fe-85b969c0855a/access_as_user
          # Direct function-app calls (CORS via ALLOWED_ORIGINS) — SWA linked backends don't
          # support preview environments, so the backend is unlinked during the migration.
          # At merge time: re-link the SWA backend and set this back to "" (same-origin /api).
          VITE_API_BASE_URL: https://func-ai-education-migration-c0fgeqdnfvd6h0cf.swedencentral-01.azurewebsites.net
          VITE_STORAGE_BASE_URL: https://staieducationmigration.blob.core.windows.net
          # Still required by the not-yet-migrated pages (slices 2-8); removed in the decommission slice.
          VITE_SUPABASE_URL: https://cairuxpyfshugwjrrqha.supabase.co
          VITE_SUPABASE_PROJECT_ID: cairuxpyfshugwjrrqha
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhaXJ1eHB5ZnNodWd3anJycWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MjExMzQsImV4cCI6MjA4NTA5NzEzNH0.r0yFxoW3VAr8ZfWYWv9pGkwNWThA8Np3CKMHm1ZYwQw
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_FOREST_0D7F96C03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments and preview environments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_FOREST_0D7F96C03 }}
          action: "close"
