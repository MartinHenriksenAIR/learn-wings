name: Task
description: A unit of work — slice, bug, hardening, CI, or polish
title: "<short imperative title>"
body:
  - type: markdown
    attributes:
      value: |
        **After creating: apply the matching type label** (`slice`/`bug`/`hardening`/`ci`/`polish`, plus `blocked` if applicable) — the pickup protocol filters on labels. GitHub forms cannot apply a label from a dropdown automatically.
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - slice
        - bug
        - hardening
        - ci
        - polish
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs to happen and why. For slices, link the cutover spec section.
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files touched
      description: Files/dirs this task is expected to modify. Used for the parallel-safety overlap check before claiming — keep it current.
      placeholder: |
        functions/resources*/
        functions/index.ts
        src/lib/resources-api.ts
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: For slices, reference the 5-gate DoD (slice-workflow skill / cutover spec §4).
  - type: input
    id: depends
    attributes:
      label: Depends on
      placeholder: "#12, #14"
  - type: input
    id: blocked-by
    attributes:
      label: Blocked by (external action)
      description: If waiting on something outside the repo (secrets, Azure config, third party), name it — pickup treats this as blocked even without the label.
